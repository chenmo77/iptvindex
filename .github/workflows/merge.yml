name: 每日自动合并直播源

on:
  schedule:
    # 每天 UTC 时间 15:00 运行（北京时间 23:00）
    - cron: '0 15 * * *'
  # 允许手动触发，方便测试
  workflow_dispatch:

jobs:
  merge-sources:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写入权限才能提交文件
    
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 执行合并脚本
        run: python merge.py
      
      - name: 提交更新后的文件
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add live_merged.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新直播源 $(date +'%Y-%m-%d %H:%M:%S')"
          git push
